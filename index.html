<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vibe Projects</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="logo">Vibe Coding</div>
        <h1>Vibe <em>Projects</em></h1>
        <p class="subtitle">바이브 코딩으로 만든 프로젝트 컬렉션</p>
      </header>

      <section class="projects">
        <div class="section-header">
          <div class="section-left">
            <span class="section-title">Projects</span>
            <span class="section-divider">·</span>
            <span class="project-count"></span>
          </div>
          <div class="section-right">
            <div class="sort-toggle">
              <button class="sort-btn active" data-value="newest">
                최신 순
              </button>
              <button class="sort-btn" data-value="number">번호 순</button>
            </div>
          </div>
        </div>

        <div class="projects-grid" id="projectsGrid"></div>
      </section>

      <footer>
        <span class="footer-copyright"
          >© 2026. gyeongbaek All rights reserved.</span
        >
        <span class="footer-divider">|</span>
        <a
          href="https://github.com/gyeongbaek/vibe-projects"
          target="_blank"
          rel="noopener"
          class="footer-link"
          >GitHub</a
        >
      </footer>
    </div>

    <script>
      let projects = [];

      async function loadProjects() {
        try {
          const response = await fetch("./data/projects.json");
          projects = await response.json();
          renderProjects("newest");
        } catch (error) {
          console.error("Failed to load projects:", error);
        }
      }

      function formatDate(dateStr) {
        const date = new Date(dateStr);
        return `${date.getFullYear()}.${String(date.getMonth() + 1).padStart(2, "0")}`;
      }

      function createProjectCard(project) {
        return `
          <a href="./${project.id}" class="project-card">
            <div class="card-preview">
              <div class="preview-iframe-wrapper">
                <iframe
                  class="preview-iframe"
                  src="./${project.id}"
                  loading="lazy"
                  tabindex="-1"
                ></iframe>
              </div>
              <div class="preview-overlay">
                <div class="card-title-row">
                  <span class="card-number">${project.number}</span>
                  <h3 class="card-title">${project.title}</h3>
                  <span class="card-divider">|</span>
                  <span class="card-category">${project.category.toUpperCase()}</span>
                </div>
              </div>
            </div>
            <div class="card-content">
              <div class="card-tags">
                ${project.tags.map((tag) => `<span class="tag">${tag}</span>`).join("")}
              </div>
              <p class="card-desc">${project.desc}</p>
              <span class="card-date">${formatDate(project.date)}</span>
            </div>
            <div class="card-footer">
              <span class="view-link">
                View Project
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M5 12h14M12 5l7 7-7 7" />
                </svg>
              </span>
            </div>
          </a>
        `;
      }

      function renderProjects(sortType = "newest") {
        const grid = document.getElementById("projectsGrid");
        const countEl = document.querySelector(".project-count");

        let sorted = [...projects];

        if (sortType === "newest") {
          sorted.sort((a, b) => new Date(b.date) - new Date(a.date));
        } else if (sortType === "oldest") {
          sorted.sort((a, b) => new Date(a.date) - new Date(b.date));
        } else if (sortType === "number") {
          sorted.sort((a, b) => parseInt(a.number) - parseInt(b.number));
        }

        grid.innerHTML = sorted.map(createProjectCard).join("");
        countEl.textContent = `${String(projects.length).padStart(2, "0")} Project${projects.length > 1 ? "s" : ""}`;
      }

      // Sort Toggle
      const sortToggle = document.querySelector(".sort-toggle");
      const sortBtns = document.querySelectorAll(".sort-btn");

      sortBtns.forEach((btn, index) => {
        btn.addEventListener("click", () => {
          sortBtns.forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");

          if (index === 0) {
            sortToggle.classList.remove("right");
          } else {
            sortToggle.classList.add("right");
          }

          renderProjects(btn.dataset.value);
        });
      });

      // Init
      loadProjects();
    </script>
  </body>
</html>
